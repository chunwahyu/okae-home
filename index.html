<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okae-Home</title>
    <!-- Include the official Telegram WebApp JavaScript SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Automatically adapts UI colors to match the user's Telegram theme */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        h2 {
            margin-bottom: 5px;
            color: var(--tg-theme-hint-color, #555555);
        }

        .user-greeting {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 25px;
            color: var(--tg-theme-link-color, #2481cc);
        }

        .config-box {
            width: 90%;
            max-width: 350px;
            margin-bottom: 30px;
            text-align: left;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--tg-theme-hint-color, #999999);
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-on {
            background-color: #34c759; /* iOS Green */
            color: white;
        }

        .btn-off {
            background-color: #ff3b30; /* iOS Red */
            color: white;
        }

        #status-message {
            margin-top: 20px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #777777);
            text-align: center;
        }

        /* The Image Box */
        div.img {
          border: 1px solid #ccc;
        }

        div.img:hover {
          border: 1px solid #777;
        }

        /* The Image */
        div.img img {
          width: 100%;
          height: auto;
          cursor: pointer;
        }

        /* Description of Image */
        div.desc {
          padding: 15px;
          text-align: center;
        }

        * {
          box-sizing: border-box;
        }

        /* Add Responsiveness */
        .responsive {
          padding: 0 6px;
          float: left;
          width: 24.99999%;
        }

        /* The Modal (background) */
        .modal {
          display: none; /* Hidden by default */
          position: fixed; /* Stay in place */
          z-index: 1; /* Sit on top */
          padding-top: 100px; /* Location of the box */
          left: 0;
          top: 0;
          width: 100%; /* Full width */
          height: 100%; /* Full height */
          overflow: auto; /* Enable scroll if needed */
          background-color: rgb(0,0,0); /* Fallback color */
          background-color: rgba(0,0,0,0.9); /* Black w/ opacity */
        }

        /* Modal Content (image) */
        .modal-content {
          margin: auto;
          display: block;
          width: 80%;
          max-width: 700px;
        }

        /* Caption of Modal Image */
        #caption {
          margin: auto;
          display: block;
          width: 80%;
          max-width: 700px;
          text-align: center;
          color: #ccc;
          padding: 10px 0;
          height: 150px;
        }

        /* Add Animation */
        .modal-content, #caption {  
          -webkit-animation-name: zoom;
          -webkit-animation-duration: 0.6s;
          animation-name: zoom;
          animation-duration: 0.6s;
        }

        @-webkit-keyframes zoom {
          from {transform:scale(0)} 
          to {transform:scale(1)}
        }

        @keyframes zoom {
          from {transform:scale(0.1)} 
          to {transform:scale(1)}
        }

        /* The Close Button */
        .close {
          position: absolute;
          top: 15px;
          right: 35px;
          color: #f1f1f1;
          font-size: 40px;
          font-weight: bold;
          transition: 0.3s;
        }

        .close:hover,
        .close:focus {
          color: #bbb;
          text-decoration: none;
          cursor: pointer;
        }

        /* Responsive Columns */
        @media only screen and (max-width: 700px){
          .responsive {
            width: 49.99999%;
            margin: 6px 0;
          }
          .modal-content {
            width: 100%;
          }
        }

        @media only screen and (max-width: 500px){
          .responsive {
            width: 100%;
          }
        }

        /* Clear Floats */
        .clearfix:after {
          content: "";
          display: table;
          clear: both;
        }

        .container {
          display: flex;
          flex-direction: row;
          flex-wrap: nowrap;
          justify-content: center;
          align-items: stretch;
          align-content: stretch;
          gap: 8px;
        }

        .item-2 {
          flex-grow: 1;
        }
        
        .cropped-image {
          width: 180px;         /* Set your target width */
          height: 200px;        /* Set your target height */
          object-fit: cover;    /* Scales and crops automatically */
          object-position: center; /* Centers the crop zone (default) */
        }

         .calendar {
            width: 240px; /* 微調寬度以容納多顆星 */
            background: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .calendar-header {
            background: #333;
            color: #fff;
            padding: 15px 15px 5px 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .star-counter {
            background: #333;
            color: #ffcc00;
            text-align: center;
            font-size: 0.85rem;
            padding-bottom: 15px;
            font-weight: 500;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #eee;
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
            font-size: 0.8rem;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 10px;
        }
        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column; /* 讓日期數字在上，星星在下 */
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 0.9rem;
            border: 1px solid #fafafa;
        }
        /* 星星容器樣式 */
        .stars-container {
            color: #ffcc00;
            font-size: 10px; /* 縮小星星字體以容納多顆 */
            line-height: 1;
            margin-top: 2px;
            letter-spacing: -1px; /* 讓星星靠緊一點 */
        }
   
    </style>
</head>
<body>

    <div class="container">
        <div>
            <img src="https://chunwahyu.github.io/okae-home/uploads/okae-home logo.avif" alt="Okae-Home" style="width: 130px; height: auto;">
        </div>
        <div class="item-2"><h1>Okae-Home Dashboard</h1></div>
    </div>
    
    <!-- This will dynamically greet the user using Telegram data -->
    <div class="user-greeting" id="greeting">Hello, Explorer!</div>

    <!-- Configuration box to easily update your tunnel URL without editing code 
    <div class="config-box">
        <label for="tunnel-url">Arduino Backend URL:</label>
        <input type="text" id="tunnel-url" placeholder="https://your-ngrok-or-localtunnel-url.app">
    </div>
    -->

    <div class="calendar">
        <div class="calendar-header" id="calendar-month-year">載入中...</div>
        <div class="star-counter" id="total-stars-count"></div>
        
        <div class="weekdays">
            <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div class="days" id="calendar-days"></div>
    </div>
    

    <div class="container">
      <div>
        <img src="https://chunwahyu.github.io/okae-home/uploads/today_hydration.png" alt="Today Hydration" class="cropped-image">
      </div>
      <div>
        <img src="https://chunwahyu.github.io/okae-home/uploads/hydration_trend.png" alt="Hydration Trend" style="width: 350px; height: auto;">
      </div>
    </div>
    
    <div style="text-align: center;">
        <img src="https://chunwahyu.github.io/okae-home/uploads/sleep_hours_chart.png" alt="Sleep hours chart" style="width: 350px; height: auto;">
    </div>

    <div style="text-align: center;">
        <img src="https://chunwahyu.github.io/okae-home/uploads/Happiness Proxy Scoring Model2.png" alt="Happiness Scoring System" style="width: 350px; height: auto;">
    </div>

    <!-- Main control buttons 
    <div class="btn-container">
        <button class="btn-on" onclick="sendHardwareCommand('ON')">Turn LED ON</button>
        <button class="btn-off" onclick="sendHardwareCommand('OFF')">Turn LED OFF</button>
    </div>

    <p id="status-message">Awaiting command...</p>

    -->

    <!-- The Modal -->
    <div id="myModal" class="modal">
      <span class="close">×</span>
      <img class="modal-content" id="img01">
      <div id="caption"></div>
    </div>
    
    <script>
        // 1. Initialize Telegram WebApp SDK
        const tg = window.Telegram.WebApp;
        tg.ready(); // Alerts Telegram that the app is fully loaded
        tg.expand(); // Expands the Mini App to full-screen height inside the chat

        // 2. Personalize the UI using Telegram's built-in user data
        const statusText = document.getElementById('status-message');
        const greetingText = document.getElementById('greeting');
        
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            greetingText.innerText = `Hello, ${tg.initDataUnsafe.user.first_name}! 👋`;
        }

        // 3. Main function to transmit commands to your Arduino UNO Q over Wi-Fi
        async function sendHardwareCommand(action) {
            const baseUrl = document.getElementById('tunnel-url').value.trim();
            
            if (!baseUrl) {
                statusText.innerText = "❌ Please enter your Arduino Backend URL first!";
                statusText.style.color = "#ff3b30";
                tg.HapticFeedback.notificationOccurred('error'); // Triggers physical phone vibration
                return;
            }

            statusText.innerText = `Sending continuous request to turn ${action}...`;
            statusText.style.color = "var(--tg-theme-hint-color, #777777)";

            try {
                // Strip trailing slash if the user pasted one by mistake
                const sanitizedUrl = baseUrl.endsWith('/') ? baseUrl.slice(0, -1) : baseUrl;

                const response = await fetch(`${sanitizedUrl}/led`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: action })
                });

                if (response.ok) {
                    statusText.innerText = `✅ Success! Arduino LED is ${action}.`;
                    statusText.style.color = "#34c759";
                    tg.HapticFeedback.notificationOccurred('success'); // Soft success haptic vibration
                } else {
                    statusText.innerText = `⚠️ Server Error: ${response.status}`;
                    statusText.style.color = "#ff9500";
                    tg.HapticFeedback.notificationOccurred('warning');
                }
            } catch (error) {
                console.error(error);
                statusText.innerText = "❌ Connection Failed. Check your URL or board status.";
                statusText.style.color = "#ff3b30";
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // Get the modal
        var modal = document.getElementById('myModal');

        // Get the <span> element that closes the modal
        var span = document.getElementsByClassName("close")[0];

        // When the user clicks on <span> (x), close the modal
        span.onclick = function() { 
          modal.style.display = "none";
        }

        // Get all images and insert the clicked image inside the modal
        // Get the content of the image description and insert it inside the modal image caption
        var images = document.getElementsByTagName('img');
        var modalImg = document.getElementById("img01");
        var captionText = document.getElementById("caption");
        var i;
        for (i = 0; i < images.length; i++) {
          images[i].onclick = function(){
            modal.style.display = "block";
            modalImg.src = this.src;
            modalImg.alt = this.alt;
            captionText.innerHTML = this.nextElementSibling.innerHTML;
          }
        }

        
        fetch('https://chunwahyu.github.io/okae-home/uploads/star_records.csv')
            .then(response => {
                if (!response.ok) throw new Error('無法讀取 CSV 檔案');
                return response.text();
            })
            .then(csvText => {
                const lines = csvText.split('\n');
                const dataLine = lines[1];
                const matches = dataLine.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g);
                
                const year = parseInt(matches[0]);
                const month = parseInt(matches[1]);
                
                // 解析 "5:1,12:3,18:2,25:4" 成為一個 JavaScript 鍵值對物件 (Map)
                const starredDaysRaw = matches[2].replace(/"/g, '');
                const starMap = {};
                let totalStarsCalculated = 0;

                if (starredDaysRaw.trim() !== "") {
                    starredDaysRaw.split(',').forEach(item => {
                        const [day, count] = item.split(':');
                        const starCount = parseInt(count);
                        starMap[parseInt(day)] = starCount;
                        totalStarsCalculated += starCount; // 累加總星星數
                    });
                }

                // 呼叫渲染函式
                renderCalendar(year, month, starMap, totalStarsCalculated);
            })
            .catch(error => {
                document.getElementById("calendar-month-year").innerText = "資料載入失敗";
                console.error('錯誤:', error);
            });

        function renderCalendar(year, month, starMap, totalStars) {
            const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
            
            document.getElementById("calendar-month-year").innerText = `${year}年 ${monthNames[month - 1]}`;
            document.getElementById("total-stars-count").innerText = `⭐ 本月星星總數: ${totalStars} 個`;

            const totalDays = new Date(year, month, 0).getDate();
            const startDayOfWeek = new Date(year, month - 1, 1).getDay();
            const daysContainer = document.getElementById("calendar-days");

            // 渲染前置空白格子
            for (let i = 0; i < startDayOfWeek; i++) {
                const blankSlot = document.createElement("div");
                daysContainer.appendChild(blankSlot);
            }

            // 渲染日期與星星
            for (let day = 1; day <= totalDays; day++) {
                const daySquare = document.createElement("div");
                daySquare.classList.add("day");
                daySquare.innerText = day;

                // 檢查這一天是否有星星設定
                if (starMap[day]) {
                    const starCount = starMap[day];
                    
                    // 建立一個專門放星星的 HTML 區塊
                    const starsDiv = document.createElement("div");
                    starsDiv.classList.add("stars-container");
                    
                    // 根據 CSV 設定的數量，重複產生文字 "★"
                    starsDiv.innerText = "★".repeat(starCount);
                    
                    daySquare.appendChild(starsDiv);
                }

                daysContainer.appendChild(daySquare);
            }
        }

        
        
    </script>
</body>
</html>
